services:
  postgres:
    image: postgres:17-alpine
    container_name: clawly-work-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: clawly_work
      POSTGRES_PASSWORD: clawly_work
      POSTGRES_DB: clawly_work
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: clawly-work-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: clawly_work
      MINIO_ROOT_PASSWORD: clawly_work
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  pgdata:
  minio_data:
